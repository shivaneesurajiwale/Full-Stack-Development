<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CE Student Feedback System</title>
    <meta name="description" content="Computer Engineering Student Feedback System">
    <meta name="keywords" content="feedback, student, engineering, college">

    <!-- React & Babel -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #2563eb; /* Blue 600 */
            --primary-hover: #1d4ed8; /* Blue 700 */
            --bg-color: #f8fafc; /* Slate 50 */
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
    }

    @layer components {
        .card {
            @apply bg-[var(--surface-color)] rounded-xl shadow-sm border border-slate-200;
        }
        .btn-primary {
            @apply bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg font-medium transition-colors duration-200 hover:bg-[var(--primary-hover)] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2;
        }
        .input-field {
            @apply w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-[var(--primary-color)] focus:ring-1 focus:ring-[var(--primary-color)] outline-none transition-all duration-200 bg-white;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- Components -->
    <script type="text/babel" src="components/Login.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/CourseCard.js"></script>
    <script type="text/babel" src="components/CourseFeedbackForm.js"></script>
    <script type="text/babel" src="components/CollegeFeedbackForm.js"></script>
    <script type="text/babel" src="components/Dashboard.js"></script>
    
    <!-- App Entry -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
